services:
  postgres:
    image: postgres:16-alpine
    container_name: health-beneficiaries-postgres
    environment:
      POSTGRES_DB: health_beneficiaries
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
